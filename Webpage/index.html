<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Study Tracker</title>
    </head>
    <body>
        <div class="container">

            <header>

                <h1>Study Tracker</h1>

                <p class="description">
                    Organize your study tasks and stay productive
                </p>

            </header>

        <section class="task-form-section">


            <h2>Add New Task</h2>

            <form class="task-form">
                <input type="text" placeholder="Enter subject">
                <input type="text" placeholder="Enter study task">

                <input type="date">

                <select>
                    <option>Choose One</option>
                    <option>High Priority</option>
                    <option>Medium Priority</option>
                    <option>Low Priority</option>
                </select>

                <button type="submit">Add Task</button>

            </form>

            <section class="task-section">

                <div class="task-header">

                    <h2>Your Task</h2>
                    <p><strong>Total Tasks: 3</strong></p>

                </div>

                <ul class="task-list">
                    <li> ✅ Math - Chapter 1</li>
                    <li> 📖 Science - Note Review</li>
                    <li> 📝 English - Essay Draft</li>
                </ul>
            </section>
        </section>
    </div>

    <footer>
        <p>Study Tracker &copy; 2026</p>
    </footer>

</body>
</html>
